### This config file contains required core defaults that must be set, along with a handful of common optional settings.
### For a full list of available settings, see https://microsoft.github.io/graphrag/config/yaml/

### LLM settings ###
## There are a number of settings to tune the threading and token limits for LLM calls - check the docs.

completion_models:
  default_completion_model:
    model_provider: openai
    model: Qwen3.6-35B-A3B-q8_0.gguf # Имя модели может быть любым, но лучше указать реальное
    temperature: 0.2
    auth_method: api_key
    api_key: "no-key-needed" # Llama.cpp обычно не требует ключ, но поле должно быть заполнено
    api_base: http://192.168.1.232:9084/v1
    # api_base: http://192.168.11.3:9084/v1
    tokenizer:
      type: tiktoken
      encoding_name: cl100k_base
    call_args:
      timeout: 900.0
    retry:
      type: exponential_backoff
      max_retries: 3
      base_delay: 10
      max_delay: 120

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: Qwen3-Embedding-8B-q4_k_m.gguf
    auth_method: api_key
    api_key: "no-key-needed"
    api_base: http://192.168.1.232:9090/v1
    # api_base: http://192.168.11.3:9090/v1
    call_args:
      timeout: 900.0
    retry:
      type: exponential_backoff
      max_retries: 3
      base_delay: 10
      max_delay: 120

### Document processing settings ###

input:
  type: text # [csv, text, json, jsonl]

chunking:
   type: tokens
   size: 1200
   overlap: 100
   encoding_model: cl100k_base
   nltk_language: russian # [english, russian, german, french, spanish] — used when type=sentence

### Storage settings ###
## If blob storage is specified in the following four sections,
## connection_string and container_name must be provided

input_storage:
  type: file # [file, blob, cosmosdb]
  base_dir: "input"

output_storage:
  type: file # [file, blob, cosmosdb]
  base_dir: "output"

reporting:
  type: file # [file, blob]
  base_dir: "logs"

cache:
  type: json # [json, memory, none]
  storage:
    type: file # [file, blob, cosmosdb]
    base_dir: "cache"

vector_store:
  type: lancedb
  db_uri: output/lancedb

### Concurrency settings ###
## Reduce for remote llama.cpp servers that can't handle many concurrent requests
concurrent_requests: 1
async_mode: threaded

### Workflow settings ###

embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"
  entity_types: [organization, person, geo, event, technology, concept]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: syntactic_parser
    model_name: ru_core_news_md
    language: ru
    include_named_entities: true
    max_word_length: 15
    exclude_entity_tags: [DATE]
    exclude_pos_tags: [DET, PRON, INTJ, X]

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

### Query settings ###
## The prompt locations are required here, but each search method has a number of optional knobs that can be tuned.
## See the config docs: https://microsoft.github.io/graphrag/config/yaml/#query

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
